<div class="main-container">
  <form [formGroup]="loginForm" (ngSubmit)="submit()" class="login-form">
    <div class="logo">
      <img src="/icons/artificial-intellegence.png" alt="Robot Icon" class="logo-icon">
      <h1>RemoteCore</h1>
    </div>

    <p class="error-message" *ngIf="errorMessage()">{{ errorMessage() }}

    <div class="input-group">
      <mat-icon>person</mat-icon>
      <input class="username-input" formControlName="username" type="text" placeholder="Enter username"/>
    </div>

    <div class="input-group">
      <mat-icon>lock</mat-icon>
      <input class="password-input" formControlName="password" type="password" placeholder="Enter password"/>
    </div>

    <button mat-raised-button color="primary" type="submit">Login</button>
  </form>
</div>
