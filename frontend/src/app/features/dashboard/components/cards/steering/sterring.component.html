<div class="container">
  <div class="header">
    <div class="icon">
      <img src="/icons/game-controller.png" alt="Steering Icon" class="steering-icon">
    </div>
    <h2>Control</h2>
  </div>

  <div class="joystick-section" *ngIf="activeMode() === ModeCommands.Joystick">
    <p class="wrapper-label">Joystick Control</p>
    <div class="telemetry">
      <span>X: {{joyStickPos().x.toPrecision(2)}}%</span>
      <span>Y: {{joyStickPos().y.toPrecision(2)}}%</span>
    </div>
    <div class="joystick-wrapper" #container
         (mousedown)="onStart($event)"
         (touchstart)="onStart($event)">
      <div class="base" [class.active]="dragging">
        <div class="thumb" [ngStyle]="thumbStyle()"></div>
        <div class="rings">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
  </div>

  <div class="keyboard-section" *ngIf="activeMode() === ModeCommands.Keyboard">
    <p class="wrapper-label">Keyboard Control</p>
    <div class="wasd-container">
      <div class="wasd-row">
        <button class="wasd-btn"
                [class.pressed]="pressedKeys.has('w')"
                (mousedown)="onVisualKeyStart('w')"
                (mouseup)="onVisualKeyEnd('w')"
                (mouseleave)="onVisualKeyEnd('w')"
                (touchstart)="onVisualKeyStart('w')"
                (touchend)="onVisualKeyEnd('w')">W</button>
      </div>
      <div class="wasd-row">
        <button class="wasd-btn"
                [class.pressed]="pressedKeys.has('a')"
                (mousedown)="onVisualKeyStart('a')"
                (mouseup)="onVisualKeyEnd('a')"
                (mouseleave)="onVisualKeyEnd('a')"
                (touchstart)="onVisualKeyStart('a')"
                (touchend)="onVisualKeyEnd('a')">A</button>
        <button class="wasd-btn"
                [class.pressed]="pressedKeys.has('s')"
                (mousedown)="onVisualKeyStart('s')"
                (mouseup)="onVisualKeyEnd('s')"
                (mouseleave)="onVisualKeyEnd('s')"
                (touchstart)="onVisualKeyStart('s')"
                (touchend)="onVisualKeyEnd('s')">S</button>
        <button class="wasd-btn"
                [class.pressed]="pressedKeys.has('d')"
                (mousedown)="onVisualKeyStart('d')"
                (mouseup)="onVisualKeyEnd('d')"
                (mouseleave)="onVisualKeyEnd('d')"
                (touchstart)="onVisualKeyStart('d')"
                (touchend)="onVisualKeyEnd('d')">D</button>
      </div>
    </div>
  </div>

  <div class="control-section">
    <p class="wrapper-label">Steering Mode</p>
    <div class="control-mode-wrapper">
      <button
        class="control-button"
        [class.active]="activeMode() === ModeCommands.Joystick"
        (click)="onCommandClick(ModeCommands.Joystick)">
        {{ ModeCommands.Joystick }}
      </button>
      <button
        class="control-button"
        [class.active]="activeMode() === ModeCommands.Keyboard"
        (click)="onCommandClick(ModeCommands.Keyboard)">
        {{ ModeCommands.Keyboard }}
      </button>
    </div>
  </div>
</div>
