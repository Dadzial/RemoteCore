<div class="container">
  <div class="header">
    <div class="icon">
      <img src="/icons/lidar.png" alt="Lidar Icon" class="lidar-icon">
    </div>
    <h2>Camera</h2>
  </div>

  <div class="content">
    <div class="left-panel">
      <div class="view-section">
        <div class="canvas-container">
          <canvas #lidarCanvas></canvas>
          <div class="overlay-grid" *ngIf="distances.length > 0"></div>
          @if (distances.length === 0) {
            <div class="loading">Waiting for data...</div>
          }
        </div>
      </div>
    </div>

    <div class="right-panel">
      <div class="metrics-grid">
        <div class="mini-card">
          <span class="m-label">Closest</span>
          <span class="m-value">{{stats.min}}<small>mm</small></span>
        </div>
        <div class="mini-card">
          <span class="m-label">Average</span>
          <span class="m-value">{{stats.avg}}<small>mm</small></span>
        </div>
        <div class="mini-card">
          <span class="m-label">Zones</span>
          <span class="m-value">8x8</span>
        </div>
        <div class="mini-card">
          <span class="m-label">FOV</span>
          <span class="m-value">45<small>°</small></span>
        </div>
      </div>
    </div>
  </div>
</div>
