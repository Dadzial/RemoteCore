<div class="container">
  <div class="header">
    <div class="icon">
      <img src="/icons/lidar.png" alt="Lidar Icon" class="lidar-icon">
    </div>
    <h2>Camera</h2>
  </div>

  <div class="content">
    <div class="view-section">
      <div class="canvas-container">
        <canvas #lidarCanvas></canvas>
        <div class="loading" *ngIf="distances.length === 0">
          Waiting for data...
        </div>
      </div>
    </div>

    <div class="data-section">
      <p class="label">Sensor Status</p>
      <div class="status-box">
        <div class="status-item">
          <span>Resolution:</span>
          <span class="value">8x8 px</span>
        </div>
        <div class="status-item">
          <span>FOV:</span>
          <span class="value">45°</span>
        </div>
        <div class="status-item">
          <span>Range:</span>
          <span class="value">4m</span>
        </div>
      </div>
    </div>
  </div>
</div>
